services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: linkspy
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: host=db port=5432 dbname=linkspy user=postgres password=secret
      BASE_URL: http://127.0.0.1:8000
    depends_on:
      - db

volumes:
  pgdata: